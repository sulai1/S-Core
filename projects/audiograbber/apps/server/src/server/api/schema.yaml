openapi: 3.1.0
info:
  title: AudioGrabber API
  version: 0.0.1
  description: Phase 1 API contract for job orchestration and media library access.
servers:
  - url: http://localhost:3800
paths:
  /health:
    get:
      summary: Health status
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

  /jobs/download:
    post:
      summary: Queue a download job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [videoId]
              properties:
                videoId:
                  type: string
                playlistId:
                  type: string
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                outputFormat:
                  type: string
                  enum: [mp3, source]
                  default: mp3
                  description: mp3 converts/extracts audio as MP3, source keeps original downloaded format.
                embedMetadata:
                  type: boolean
                  default: true
                  description: Embed available metadata tags into the output media file.
                  songTitle:
                    type: string
                    description: Optional parsed song title to embed in the download.
                  artist:
                    type: string
                    description: Optional parsed artist to embed in the download.
                  album:
                    type: string
                    description: Optional parsed album to embed in the download.
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                required: [jobId, state]
                properties:
                  jobId:
                    type: string
                  state:
                    type: string
                    enum: [queued]

  /jobs/{jobId}:
    get:
      summary: Fetch job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                required: [jobId, state]
                properties:
                  jobId:
                    type: string
                  state:
                    type: string
                    enum: [queued, running, success, failed]
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  error:
                    type: string
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /sync/channels/{channelId}:
    post:
      summary: Queue channel sync
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  type: integer
                  minimum: 1
                  maximum: 1000
      responses:
        "202":
          description: Sync accepted
          content:
            application/json:
              schema:
                type: object
                required: [jobId, state, channelId]
                properties:
                  jobId:
                    type: string
                  channelId:
                    type: string
                  state:
                    type: string
                    enum: [queued]

  /channels/overview:
    get:
      summary: Fetch channel overview and videos
      parameters:
        - name: channel
          in: query
          required: false
          schema:
            type: string
          description: Channel reference, either @channel_name or channel ID (UC...).
        - name: channelId
          in: query
          required: false
          schema:
            type: string
          description: Optional alias for channel using channel ID (UC...).
        - name: handle
          in: query
          required: false
          schema:
            type: string
          description: Optional alias for channel using @channel_name.
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
          description: Max number of videos to return.
      responses:
        "200":
          description: Channel overview
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    type: object
                    required: [id, title]
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                      description:
                        type: string
                      customUrl:
                        type: string
                      videoCount:
                        type: integer
                        minimum: 0
                  videos:
                    type: array
                    items:
                      type: object
                      required: [videoId, title, publishedAt]
                      properties:
                        videoId:
                          type: string
                        title:
                          type: string
                        publishedAt:
                          type: string
                          format: date-time
                        thumbnailUrl:
                          type: string
                        duration:
                          type: string
                          description: ISO 8601 duration format (e.g., PT5M30S)
                        viewCount:
                          type: integer
                          minimum: 0
                        likeCount:
                          type: integer
                          minimum: 0
                        description:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        artist:
                          type: string
                          description: Extracted artist name from YouTube Music metadata
                        songTitle:
                          type: string
                          description: Extracted song title from YouTube Music metadata
                        album:
                          type: string
                          description: Extracted album name from YouTube Music metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        "502":
          description: Upstream API error
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /library/videos:
    get:
      summary: List videos in media library
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Case-insensitive match against downloaded file names.
        - name: mediaType
          in: query
          required: false
          schema:
            type: string
            enum: [all, audio, video]
            default: all
          description: Filter library entries by media type.
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, title, status, metadata]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        status:
                          type: string
                          enum: [ready, processing, failed]
                        metadata:
                          type: object
                          required: [fileName, extension, mediaType, sizeBytes, createdAt, modifiedAt]
                          properties:
                            fileName:
                              type: string
                            extension:
                              type: string
                            mediaType:
                              type: string
                              enum: [audio, video]
                            sizeBytes:
                              type: integer
                              minimum: 0
                            createdAt:
                              type: string
                              format: date-time
                            modifiedAt:
                              type: string
                              format: date-time
