- name: Set TalkTogether defaults
  ansible.builtin.set_fact:
    talktogether_image_resolved: "{{ talktogether_image | default('talktogether:latest') }}"
    talktogether_build_context_resolved: "{{ talktogether_build_context | default(playbook_dir + '/../../..') }}"
    talktogether_build_dir_resolved: "{{ talktogether_build_dir | default('/tmp/talktogether-build') }}"
    talktogether_data_dir_resolved: "{{ talktogether_data_dir | default('/opt/talktogether/data') }}"
    talktogether_images_dir_resolved: "{{ talktogether_images_dir | default('/opt/talktogether/images') }}"
    container_name_resolved: "{{ container_name | default('talktogether') }}"
    db_name_resolved: "{{ db_name | default('talktogether') }}"
    db_user_resolved: "{{ db_user | default('postgres') }}"
    db_password_resolved: "{{ db_password | default('') }}"
    db_host_resolved: "{{ db_host | default('localhost') }}"
    db_port_resolved: "{{ db_port | default('5432') }}"
    frontend_port_resolved: "{{ frontend_port | default('80') }}"
    backend_port_resolved: "{{ backend_port | default('3033') }}"
    node_port_resolved: "{{ node_port | default('3000') }}"

- name: Set frontend origin with conditional port
  ansible.builtin.set_fact:
    frontend_origin_resolved: "{{ frontend_origin | default('http://' + (ansible_host | default(inventory_hostname)) + ('' if frontend_port_resolved == '80' else ':' + frontend_port_resolved)) }}"
    api_base_url_resolved: "{{ api_base_url | default('http://' + (ansible_host | default(inventory_hostname)) + ':' + backend_port_resolved) }}"

- name: Ensure Docker service is running
  become: true
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Ensure TalkTogether directories exist on target
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ talktogether_data_dir_resolved }}"
    - "{{ talktogether_images_dir_resolved }}"

- name: Build TalkTogether SPA on controller
  become: false
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: |
      NODE_ENV=development npm install --package-lock=false --include-workspace-root \
        --workspace packages/client \
        --workspace packages/core \
        --workspace packages/server \
        --workspace packages/talktogether \
        --workspace projects/talktogether/apps/client
      VITE_API_BASE_URL="{{ api_base_url_resolved }}" npm run build --workspace projects/talktogether/apps/client
    chdir: "{{ talktogether_build_context_resolved }}"
  args:
    executable: /bin/bash

- name: Fail when SPA output is missing
  ansible.builtin.fail:
    msg: "Expected SPA output at projects/talktogether/apps/client/dist/spa after local build, but it was not found."
  when: not talktogether_spa_dist.stat.exists

- name: Sync source code to target using rsync
  become: true
  ansible.posix.synchronize:
    src: "{{ talktogether_build_context_resolved }}/"
    dest: "{{ talktogether_build_dir_resolved }}/"
    delete: true
    rsync_opts:
      - "--filter=': -.gitignore'"
      - "--exclude=.git"
      - "--include=projects/"
      - "--include=projects/talktogether/"
      - "--include=projects/talktogether/apps/"
      - "--include=projects/talktogether/apps/client/"
      - "--include=projects/talktogether/apps/client/dist/"
      - "--include=projects/talktogether/apps/client/dist/***"
      - "--exclude=projects/talktogether/apps/client/***"
      - "--include=projects/talktogether/***"
      - "--exclude=projects/*"
      - "--exclude=ansible"
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=.next"
      - "--exclude=.cache"
      - "--exclude=.turbo"
      - "--exclude=coverage"
      - "--exclude=.nyc_output"
      - "--exclude=projects/talktogether/apps/server/images"

- name: Build Docker image on target
  become: true
  ansible.builtin.shell:
    cmd: docker build -t {{ talktogether_image_resolved }} -f projects/talktogether/Dockerfile .
    chdir: "{{ talktogether_build_dir_resolved }}"
  args:
    executable: /bin/bash

- name: Stop any existing TalkTogether container
  become: true
  community.docker.docker_container:
    name: "{{ container_name_resolved }}"
    state: absent
  ignore_errors: true

- name: Ensure TalkTogether container is running
  become: true
  community.docker.docker_container:
    name: "{{ container_name_resolved }}"
    image: "{{ talktogether_image_resolved }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ frontend_port_resolved }}:80"
      - "{{ backend_port_resolved }}:{{ node_port_resolved }}"
    env:
      DB_NAME: "{{ db_name_resolved }}"
      DB_USER: "{{ db_user_resolved }}"
      DB_PASSWORD: "{{ db_password_resolved }}"
      DB_HOST: "{{ db_host_resolved }}"
      DB_PORT: "{{ db_port_resolved }}"
      NODE_PORT: "{{ node_port_resolved }}"
      NODE_ENV: production
      API_BASE_URL: "{{ api_base_url_resolved }}"
      CORS_ORIGINS: "{{ frontend_origin_resolved }}"
      COOKIE_SECURE: "false"
    volumes:
      - "{{ talktogether_data_dir_resolved }}:/app/data"
      - "{{ talktogether_images_dir_resolved }}:/app/server/images"
    networks:
      - name: mynetwork
