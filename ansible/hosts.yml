all:
  hosts:
    worker:
      ansible_become_method: sudo
      ansible_connection: local
      ansible_host: "localhost"
      ansible_user: "sulai"
      target_platform: "linux/arm64"
    gateway:
      ansible_become_method: sudo
      ansible_connection: local
      ansible_host: "localhost"
      ansible_user: "sulai"
      target_platform: "linux/arm64"
  vars:
    talktogether_build_context: "{{ playbook_dir }}/../../.."
    db_name: talktogether
    db_user: postgres
    db_password: your_db_password
    db_host: localhost
    db_port: 5432
    api_base_url: "https://talktogether.sascha-wernegger.me/api/"
    node_port: 3000
